<mat-tab-group animationDuration="0ms" class="log-tab-group"
                [(selectedIndex)]="selectedTabIndex"
                (selectedTabChange)="onTabChange()">

  <mat-tab label="Debug Console">
    <taro-debug-console></taro-debug-console>
  </mat-tab>

  <mat-tab label="Output">
    <taro-output-console></taro-output-console>
  </mat-tab>

  <mat-tab label="DAP Protocol">
    <taro-protocol-console></taro-protocol-console>
  </mat-tab>

</mat-tab-group>
