<h2 mat-dialog-title>
  <mat-icon color="warn" style="vertical-align: middle; margin-right: 8px;">error_outline</mat-icon>
  {{ data.title || 'Connection Error' }}
</h2>
<mat-dialog-content>
  <p>{{ data.message }}</p>
  <p style="color: var(--mat-sys-on-surface-variant); font-size: var(--text-sm); margin-top: 16px;">
    Please check if your DAP server (e.g., lldb-dap) is running and the connection address is correct.
  </p>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="onGoBack()">Back to Setup</button>
  <button mat-raised-button color="primary" (click)="onRetry()">Retry</button>
</mat-dialog-actions>
