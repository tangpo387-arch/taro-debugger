<!-- Full screen outer container -->
<div class="app-layout">

  <!-- 1. Top toolbar and navigation -->
  <mat-toolbar color="primary" class="top-toolbar">
    <button mat-icon-button (click)="toggleLeftSidenav()" title="Toggle File Explorer" class="sidebar-toggle-btn">
      <mat-icon>{{ leftVisible ? 'menu_open' : 'menu' }}</mat-icon>
    </button>
    <span class="brand-title">Taro</span>
    <!-- 
      Show current loaded executable path from configuration.
      CRITICAL: DO NOT REMOVE \u200E (LRM) or &lrm;. These invisible characters 
      prevent the Unicode Bidi algorithm from misplacing leading '/' characters 
      due to 'direction: rtl' in SCSS. Removing them will break path rendering.
    -->
    <span class="loaded-file" [title]="'\u200E' + (currentConfig.executablePath || 'No file loaded')">
      &lrm;{{ currentConfig.executablePath || 'No file loaded' }}
    </span>

    <span class="spacer"></span>

    <!-- Debug control buttons -->
    <app-debug-control-group 
      [activeTabIndex]="activeTabIndex"
      (restart)="onRestart()" 
      (stop)="onStop()"
      (stepInstructionTab)="onStepInstructionTab($event)">
    </app-debug-control-group>

    <span class="spacer"></span>

    <!-- Back to setup settings button -->
    <button mat-icon-button (click)="goBack()" title="End Session (Return to Setup)">
      <mat-icon>logout</mat-icon>
    </button>
  </mat-toolbar>

  <!-- Core layout container: Sidenavs and main content area -->
  <mat-sidenav-container class="debugger-container" autosize>

    <!-- 2. Left sidenav: File Explorer + Threads -->
    <mat-sidenav #leftSidenav mode="side" [opened]="leftVisible" position="start" class="sidenav-left" [style.width.px]="leftWidth">
      <!-- Left Resize Handle -->
      <div class="resize-handle resize-handle-left" (mousedown)="onResizeStart($event, 'left')"></div>

      <!-- Files Panel -->
      <app-inspection-panel
        label="Files"
        [(expanded)]="leftFilesExpanded"
        [resizable]="leftFilesExpanded && leftThreadsExpanded"
        (resizeDrag)="onLeftPanelResizeDrag($event, 'files')"
        [style.flex]="leftFilesExpanded ? '1 1 ' + leftFilesHeight + 'px' : '0 0 32px'">
        <app-file-explorer
          [activeFilePath]="activeFilePath"
          [reloadTrigger]="fileTreeReloadTrigger"
          [revealTrigger]="fileRevealTrigger"
          (fileSelected)="onFileSelected($event)">
        </app-file-explorer>
      </app-inspection-panel>

      <!-- Threads Panel -->
      <app-inspection-panel
        label="Threads"
        [(expanded)]="leftThreadsExpanded"
        [style.flex]="leftThreadsExpanded ? '1 1 ' + leftThreadsHeight + 'px' : '0 0 32px'">
        <app-threads></app-threads>
      </app-inspection-panel>
    </mat-sidenav>

    <!-- 3. Right sidenav: Breakpoints, Variables, Call Stack -->
    <mat-sidenav #rightSidenav mode="side" opened position="end" class="sidenav-right" [style.width.px]="rightWidth">
      <!-- Right Resize Handle -->
      <div class="resize-handle resize-handle-right" (mousedown)="onResizeStart($event, 'right')"></div>

      <!-- Breakpoints Panel -->
      <app-inspection-panel
        label="Breakpoints"
        [(expanded)]="rightBreakpointsExpanded"
        [resizable]="rightBreakpointsExpanded && (rightVariablesExpanded || rightCallStackExpanded)"
        (resizeDrag)="onRightPanelResizeDrag($event, 'breakpoints')"
        [style.flex]="rightBreakpointsExpanded ? '1 1 ' + rightBreakpointsHeight + 'px' : '0 0 32px'">
        <app-breakpoints></app-breakpoints>
      </app-inspection-panel>

      <!-- Variables Panel -->
      <app-inspection-panel
        label="Variables"
        [(expanded)]="rightVariablesExpanded"
        [resizable]="rightVariablesExpanded && rightCallStackExpanded"
        (resizeDrag)="onRightPanelResizeDrag($event, 'variables')"
        [style.flex]="rightVariablesExpanded ? '1 1 ' + rightVariablesHeight + 'px' : '0 0 32px'">
        <app-variables></app-variables>
      </app-inspection-panel>

      <!-- Call Stack Panel -->
      <app-inspection-panel
        label="Call Stack"
        [(expanded)]="rightCallStackExpanded"
        [style.flex]="rightCallStackExpanded ? '1 1 ' + rightCallStackHeight + 'px' : '0 0 32px'">
        <app-call-stack
          [stackFrames]="stackFrames"
          [activeFrameId]="activeFrameId"
          (frameSelected)="onFrameClick($event)">
        </app-call-stack>
      </app-inspection-panel>
    </mat-sidenav>

    <!-- 4. Center: Core Editor and Consoles -->
    <mat-sidenav-content class="main-content">

      <!-- Main Content Tab Group (Source / Disassembly) -->
      <div class="editor-container">
        <mat-tab-group [selectedIndex]="activeTabIndex" (selectedIndexChange)="activeTabIndex = $event" animationDuration="0ms">
          <mat-tab label="Source">
            <app-editor class="monaco-editor-instance" [code]="currentCode" [filename]="activeFilePath"
              [activeLine]="activeFilePath === activeLineFilePath ? activeLine : null"
              [revealTrigger]="fileRevealTrigger"
              (breakpointsChange)="onBreakpointsChange($event)" />
          </mat-tab>
          <mat-tab label="Disassembly">
            <app-assembly-view [instructionPointerReference]="activeInstructionPointer"></app-assembly-view>
          </mat-tab>
        </mat-tab-group>
      </div>

      <!-- Bottom Consoles Area — rendered by LogViewerComponent -->
      <div class="consoles-container" [style.height.px]="consoleHeight">
        <!-- Bottom Resize Handle -->
        <div class="resize-handle resize-handle-bottom" (mousedown)="onResizeStart($event, 'bottom')"></div>
        <taro-log-viewer></taro-log-viewer>
      </div>

      <!-- Bottom Status Bar -->
      <footer class="status-bar">
        <div class="connection-status">
          <!-- Connection indicator light -->
          <span class="indicator" [ngClass]="(connectionStatus$ | async) ? 'online' : 'offline'"></span>
          <span>{{ (connectionStatus$ | async) ? 'Connected' : 'Disconnected' }}</span>
          @if (currentConfig.serverAddress) {
          <span class="server-address">
            ({{ currentConfig.serverAddress }})
          </span>
          }
        </div>
        <span class="spacer"></span>
        <div class="execution-state">
          State: {{ executionState | titlecase }}
        </div>
      </footer>

    </mat-sidenav-content>

  </mat-sidenav-container>
</div>
