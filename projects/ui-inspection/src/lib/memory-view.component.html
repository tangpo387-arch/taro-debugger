<div class="memory-container">
  <!-- Sticky Header (Disassembly-style) -->
  <div *ngIf="rows.length > 0" class="memory-header">
    Dump of memory at <span class="address-val">{{ baseAddress }}</span>:
  </div>

  <cdk-virtual-scroll-viewport [itemSize]="ROW_HEIGHT" class="memory-viewport">
    <div *cdkVirtualFor="let row of rows; let rowIndex = index; trackBy: trackByAddress" 
         class="memory-row" 
         [style.height.px]="ROW_HEIGHT">
      
      <!-- Address Column -->
      <div class="memory-cell address-cell" [class.unmapped]="row.isUnmapped">
        {{ row.address }}
      </div>

      <!-- Hex Data Grid -->
      <div class="hex-grid">
        <div *ngFor="let byte of row.bytes; let byteIndex = index" 
             class="byte-cell"
             [class.highlighted]="isHighlighted(row.address, byteIndex)"
             [class.empty]="!byte"
             [class.unmapped]="row.isUnmapped"
             [class.editing]="isEditing(row.address, byteIndex)"
             [class.pending-write]="cellStates[getCellAddressStr(row.address, byteIndex)] === 'pending'"
             [class.success-updated]="cellStates[getCellAddressStr(row.address, byteIndex)] === 'success'"
             [class.write-error]="cellStates[getCellAddressStr(row.address, byteIndex)] === 'error'"
             [matTooltip]="row.isUnmapped ? 'Unreadable Memory Segment' : (cellErrorMessages[getCellAddressStr(row.address, byteIndex)] || '')"
             (dblclick)="isStopped && !row.isUnmapped && byte && startEdit(row.address, byteIndex, byte)">
          <ng-container *ngIf="isEditing(row.address, byteIndex); else displayMode">
            <input class="byte-input" 
                   [value]="editValue"
                   (input)="onInputChange($event)"
                   (blur)="confirmEdit(row.address, byteIndex)"
                   (keydown.enter)="confirmEdit(row.address, byteIndex)"
                   (keydown.escape)="cancelEdit()"
                   maxlength="2" />
          </ng-container>
          <ng-template #displayMode>
            {{ byte || '..' }}
          </ng-template>
        </div>
      </div>

      <!-- ASCII Preview -->
      <div class="ascii-cell" [class.unmapped]="row.isUnmapped">
        {{ row.ascii }}
      </div>
    </div>

    <!-- Empty State -->
    <div *ngIf="rows.length === 0" class="empty-memory">
      No memory data available.
    </div>
  </cdk-virtual-scroll-viewport>

  <!-- Floating Actions (Disassembly-style) -->
  <div class="floating-actions">
    <button mat-mini-fab color="primary" 
            (click)="openJumpDialog()" 
            [disabled]="!isStopped"
            matTooltip="Jump to address"
            aria-label="Jump to address">
      <mat-icon>pin_drop</mat-icon>
    </button>
  </div>
</div>
