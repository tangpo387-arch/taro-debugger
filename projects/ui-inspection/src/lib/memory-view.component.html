<div class="memory-container">
  <!-- Sticky Header (Disassembly-style) -->
  <div *ngIf="rows.length > 0" class="memory-header">
    Dump of memory at <span class="address-val">{{ baseAddress }}</span>:
  </div>

  <cdk-virtual-scroll-viewport [itemSize]="ROW_HEIGHT" class="memory-viewport">
    <div *cdkVirtualFor="let row of rows; let rowIndex = index; trackBy: trackByAddress" 
         class="memory-row" 
         [style.height.px]="ROW_HEIGHT">
      
      <!-- Address Column -->
      <div class="memory-cell address-cell">
        {{ row.address }}
      </div>

      <!-- Hex Data Grid -->
      <div class="hex-grid">
        <div *ngFor="let byte of row.bytes; let byteIndex = index" 
             class="byte-cell"
             [class.highlighted]="isHighlighted(rowIndex, byteIndex)"
             [class.empty]="!byte">
          {{ byte || '..' }}
        </div>
      </div>

      <!-- ASCII Preview -->
      <div class="ascii-cell">
        {{ row.ascii }}
      </div>
    </div>

    <!-- Empty State -->
    <div *ngIf="rows.length === 0" class="empty-memory">
      No memory data available.
    </div>
  </cdk-virtual-scroll-viewport>

  <!-- Floating Actions (Disassembly-style) -->
  <div class="floating-actions">
    <button mat-mini-fab color="primary" 
            (click)="openJumpDialog()" 
            [disabled]="!isStopped"
            matTooltip="Jump to address"
            aria-label="Jump to address">
      <mat-icon>pin_drop</mat-icon>
    </button>
  </div>
</div>
