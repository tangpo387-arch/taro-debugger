<div class="breakpoints-container">
  <div *ngIf="(groupedBreakpoints$ | async) as groups; else empty">
    <ng-container *ngIf="groups.length > 0; else empty">
      <div *ngFor="let group of groups" class="file-group">

        <div *ngFor="let bp of group.breakpoints"
             class="breakpoint-row"
             [class.disabled]="!bp.enabled"
             (click)="onBreakpointClick(group.filePath, bp.line)">
          
          <div class="breakpoint-main">
            <mat-checkbox [checked]="bp.enabled"
                          (change)="toggleEnabled($event, group.filePath, bp.line)"
                          (click)="$event.stopPropagation()"
                          class="breakpoint-checkbox">
            </mat-checkbox>

            <mat-icon class="breakpoint-icon" 
                      [class.verified]="bp.verified" 
                      [class.unverified]="!bp.verified">
              {{ bp.verified ? (bp.enabled ? 'lens' : 'panorama_fish_eye') : 'panorama_fish_eye' }}
            </mat-icon>

            <div class="breakpoint-label-group">
              <span class="breakpoint-filename">{{ group.fileName }}</span>
              <span class="breakpoint-path">{{ group.filePath }}</span>
            </div>
          </div>

          <div class="breakpoint-actions">
            <span class="location-badge">{{ bp.line }}</span>
            <button mat-icon-button 
                    (click)="removeBreakpoint($event, group.filePath, bp.line)" 
                    class="action-btn"
                    matTooltip="Remove Breakpoint">
              <mat-icon>delete_outline</mat-icon>
            </button>
          </div>
        </div>
      </div>
    </ng-container>
  </div>

  <ng-template #empty>
    <div class="placeholder-content">
      <mat-icon class="placeholder-icon">visibility_off</mat-icon>
      <div class="placeholder-text">No breakpoints set</div>
    </div>
  </ng-template>
</div>
