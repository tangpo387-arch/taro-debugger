@if (flatNodes.length > 0) {
  <cdk-virtual-scroll-viewport [itemSize]="rowHeight()" class="variables-viewport"
                               minBufferPx="200" maxBufferPx="400">
    <div *cdkVirtualFor="let flatNode of flatNodes; trackBy: trackByNode"
         class="variable-row"
         [style.--level-padding.px]="flatNode.level * INDENT_PX"
         [matMenuTriggerFor]="varMenu"
         [matMenuTriggerData]="{ node: flatNode.source }">

      <!-- Expand/Collapse toggle (only for expandable nodes) -->
      @if (flatNode.expandable) {
        <button mat-icon-button class="toggle-btn"
                (click)="toggleNode(flatNode)"
                [attr.aria-label]="'Toggle ' + flatNode.source.name">
          @if (flatNode.source.isLoading) {
            <mat-icon class="loading-spin">sync</mat-icon>
          } @else {
            <mat-icon class="mat-icon-rtl-mirror">
              {{ flatNode.source.expanded ? 'expand_more' : 'chevron_right' }}
            </mat-icon>
          }
        </button>
      } @else {
        <!-- Invisible spacer to align leaf nodes with expandable siblings -->
        <span class="toggle-spacer"></span>
      }

      <!-- Variable name -->
      <span class="var-name">{{ flatNode.source.name }}</span>

      <!-- Type annotation -->
      @if (flatNode.source.type) {
        <span class="var-type">: {{ flatNode.source.type }}</span>
      }

      <!-- Value (skip for scope-level nodes with empty value) -->
      @if (flatNode.source.value) {
        <span class="var-value"> = {{ flatNode.source.value }}</span>
      }
    </div>

    <!-- Context Menu for Variables -->
    <mat-menu #varMenu="matMenu">
      <ng-template matMenuContent let-node="node">
        <button mat-menu-item (click)="onInspectMemory(node.memoryReference)" [disabled]="!node.memoryReference">
          <mat-icon>memory</mat-icon>
          <span>Inspect Memory</span>
        </button>
      </ng-template>
    </mat-menu>
  </cdk-virtual-scroll-viewport>
} @else {
  @if (!isConnected()) {
    <taro-empty-state message="No active session" icon="link_off"
      description="Start a debug session to see variables.">
    </taro-empty-state>
  } @else {
    <taro-empty-state 
      message="No variables available" 
      icon="inventory_2"
      description="Try pausing execution to inspect local variables.">
    </taro-empty-state>
  }
}
