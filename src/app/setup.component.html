<!-- 設定頁面主容器：佔滿全螢幕並將內容置中 -->
<div class="setup-container">
  <!-- 使用 Angular Material 的卡片元件包裝表單 -->
  <mat-card class="setup-card">
    <mat-card-header class="setup-header">
      <mat-icon color="primary" class="header-icon">bug_report</mat-icon>
      <mat-card-title class="header-title">GDB DAP 偵錯器</mat-card-title>
      <mat-card-subtitle>請設定專案執行環境</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content class="setup-content">
      <!-- 執行檔路徑輸入欄位 -->
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>執行檔路徑 (Executable File)</mat-label>
        <input matInput [(ngModel)]="execPath" placeholder="例如：/workspace/build/main.out">
        <mat-icon matSuffix>terminal</mat-icon>
      </mat-form-field>

      <!-- 原始碼目錄輸入欄位 -->
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>原始碼目錄 (Source Directory)</mat-label>
        <input matInput [(ngModel)]="sourcePath" placeholder="例如：/workspace/src">
        <mat-icon matSuffix>folder</mat-icon>
      </mat-form-field>
    </mat-card-content>

    <mat-card-actions class="setup-actions">
      <!-- 連線按鈕：只有在兩個路徑都填寫時才啟用 -->
      <button mat-flat-button color="primary" class="connect-button" 
              [disabled]="!execPath || !sourcePath" 
              (click)="onConnect()">
        <mat-icon>cable</mat-icon> Connect & Debug
      </button>
    </mat-card-actions>
  </mat-card>
</div>
