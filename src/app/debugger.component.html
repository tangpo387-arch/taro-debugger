<!-- 核心佈局容器：包含側邊欄與主要內容區 -->
<mat-sidenav-container class="debugger-container">

  <!-- 1. 頂部工具與導航列 -->
  <mat-toolbar color="primary" class="top-toolbar">
    <span class="brand-title">TaroDAP</span>
    <!-- 顯示當前載入的執行檔，從 Service 取得 -->
    <span class="loaded-file">
      {{ currentConfig.executableFile || '未載入檔案' }}
    </span>

    <span class="spacer"></span>

    <!-- 偵錯控制按鈕群 -->
    <div class="debug-controls">
      <button mat-icon-button title="Continue"><mat-icon>play_arrow</mat-icon></button>
      <button mat-icon-button title="Step Over"><mat-icon>redo</mat-icon></button>
      <button mat-icon-button title="Step Into"><mat-icon>arrow_downward</mat-icon></button>
      <button mat-icon-button title="Stop" color="warn"><mat-icon>stop</mat-icon></button>
    </div>

    <span class="spacer"></span>

    <!-- 返回設定頁按鈕 -->
    <button mat-button (click)="goBack()">
      <mat-icon>settings</mat-icon> 重新設定
    </button>
  </mat-toolbar>

  <!-- 2. 左側：檔案總管 -->
  <mat-sidenav mode="side" opened position="start" class="sidenav-left">
    <div class="sidenav-header">
      <h3>檔案清單</h3>
      <div class="source-path" title="{{ currentConfig.sourceFile }}">
        來源：{{ currentConfig.sourceFile || '未指定' }}
      </div>
    </div>

    <!-- 檔案列表 (示意用) -->
    <mat-nav-list class="file-list">
      <a mat-list-item href="#">main.c</a>
      <a mat-list-item href="#">utils.c</a>
    </mat-nav-list>
  </mat-sidenav>

  <!-- 3. 右側：變數與呼叫堆疊 -->
  <mat-sidenav mode="side" opened position="end" class="sidenav-right">
    <!-- 變數檢視區 -->
    <div class="panel-section variables-section">
      <h3 class="panel-title">Variables</h3>
      <div class="placeholder-content">變數樹狀圖預留區...</div>
    </div>

    <!-- 呼叫堆疊區 -->
    <div class="panel-section">
      <h3 class="panel-title">Call Stack</h3>
      <div class="placeholder-content">堆疊列表預留區...</div>
    </div>
  </mat-sidenav>

  <!-- 4. 中央：核心編輯器與主控台 -->
  <mat-sidenav-content class="main-content">

    <!-- Monaco Editor 容器 -->
    <div class="editor-container">
      <app-editor class="monaco-editor-instance" />
    </div>

    <!-- 底部 Console 區域 -->
    <div class="consoles-container">
      <mat-tab-group animationDuration="0ms">
        <mat-tab label="DAP Console">
          <cdk-virtual-scroll-viewport itemSize="20" class="console-viewport" minBufferPx="200" maxBufferPx="400">
            <div *cdkVirtualFor="let log of dapLogs" class="console-line">{{log}}</div>
          </cdk-virtual-scroll-viewport>
        </mat-tab>
        <mat-tab label="Program Console">
          <cdk-virtual-scroll-viewport itemSize="20" class="console-viewport" minBufferPx="200" maxBufferPx="400">
            <div *cdkVirtualFor="let log of programLogs" class="console-line">{{log}}</div>
          </cdk-virtual-scroll-viewport>
        </mat-tab>
      </mat-tab-group>
    </div>

    <!-- 底部狀態列 -->
    <footer class="status-bar">
      <div class="connection-status">
        <!-- 連線指示燈：根據實際狀態切換 class -->
        <span class="indicator online"></span>
        <span>DAP 已連線</span>
      </div>
    </footer>

  </mat-sidenav-content>

</mat-sidenav-container>
